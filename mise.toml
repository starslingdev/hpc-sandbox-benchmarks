# Non-Bun developer tools, version-pinned and installed by `mise install` (or on demand via
# `mise exec`). mise fetches from official sources with checksum verification — `typos` resolves
# to the official `aqua:crate-ci/typos` release, not an npm republisher, so nothing here runs a
# postinstall or needs Bun `trustedDependencies`. Run `mise trust` once after cloning.

[tools]
typos = "1.47.2"
# Static-analysis for the toolchain images (packages/templates/images): shellcheck lints the install
# scripts, hadolint the Dockerfiles. aqua backend with checksum verification — same posture as typos,
# so nothing runs a postinstall or needs Bun `trustedDependencies`.
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:hadolint/hadolint" = "2.14.0"
# GitHub Actions linters for the ci-lint workflow: actionlint checks workflow syntax, expressions and
# runner labels (via .github/actionlint.yaml) plus embedded shellcheck; zizmor security-audits the
# workflows (template injection, excessive permissions, ...). aqua backend with checksum + attestation
# verification — same posture as the tools above, so nothing runs a postinstall.
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:zizmorcore/zizmor" = "1.26.1"
