name: Bench matrix

# Fan the live benchmark out across the full provider × suite matrix: one job per (provider, suite)
# cell, each spinning up a real sandbox, running its suite, and uploading the normalized Run as an
# artifact. The matrix is computed from the SUITES × PROVIDERS registries by `plan-matrix` — adding a
# provider or suite to its registry grows CI with no workflow edit. Off the PR path (real sandbox time
# + provider credentials); dispatch on demand.
on:
  workflow_dispatch:
    inputs:
      providers:
        description: 'Comma-separated providers to benchmark (blank = every registered provider).'
        required: false
        type: string
        # The providers with a baked toolchain artifact and credentials in CI. blaxel boots the stock
        # base image (nothing baked for it), so it is excluded by default rather than burning ~150min
        # of runner time per suite on cells that cannot produce a comparable result. Pass it explicitly
        # to include it; `plan-matrix` rejects any name that is not in the registry.
        default: e2b,daytona,modal

# Least privilege: jobs only read the checked-out code and upload artifacts.
permissions:
  contents: read

# Serialize matrix runs on a ref so concurrent dispatches don't contend for provider quota.
concurrency:
  group: bench-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Compute the provider × suite matrix once, as the single $GITHUB_OUTPUT contract the fan-out reads.
  plan:
    name: Plan matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Planning only reads code; don't persist the job token in .git/config.
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # plan-matrix prints one line of compact JSON ({"include":[...]}) — the strategy.matrix contract.
      - name: Plan
        id: plan
        # The dispatch input reaches plan-matrix through the environment, never interpolated into the
        # shell, so a crafted input can't inject into the runner command.
        env:
          BENCH_PROVIDERS: ${{ inputs.providers }}
        # Capture into a variable first so a plan-matrix.ts failure aborts the step (set -e): inlining
        # the command substitution inside `echo` would mask its exit code behind echo's 0. An
        # unregistered provider name exits 2 here, so a typo fails the plan instead of quietly
        # publishing a dataset with that provider missing.
        run: |
          matrix="$(bun apps/cli/src/bin/plan-matrix.ts)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  bench:
    name: ${{ matrix.suite }} on ${{ matrix.provider }}
    needs: plan
    runs-on: starsling-ubuntu-24.04-2
    timeout-minutes: 150
    strategy:
      # One cell's failure (a flaky provider) must not cancel the rest of the matrix.
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # This cell only reads code (the sandbox clones via BENCH_REPO_TOKEN, not the checkout's
          # credentials), so don't persist the job token in .git/config.
          persist-credentials: false

      # `no-cache` is REQUIRED on this label, unlike the hosted-runner jobs above/below. Two runner
      # images answer to `starsling-ubuntu-24.04-2` and they root the workspace at different depths
      # (`/home/runner/_work/…` vs `/home/runner/actions-runner/_work/…`), yet setup-bun keys its cache
      # only on the bun version. The cached `~/.bun` is stored relative to the save-time workspace and
      # extracted with `-C <workspace>`, so an entry saved on one image unpacks to
      # `/home/runner/actions-runner/.bun` on the other — the cache reports "restored successfully" and
      # the next line dies with "Unable to locate executable file: /home/runner/.bun/bin/bun". Downloading
      # bun (~32 MB) costs a couple of seconds; restoring a cache built for the other image costs the cell.
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Drive the provider SDK to create a sandbox, run the suite, collect results, and normalize. The
      # cell's provider/suite are matrix values, passed through the environment (never interpolated into
      # the shell) so a registry value can't inject into the runner command.
      - name: Run suite and normalize
        env:
          BENCH_REPO_REF: ${{ github.sha }}
          BENCH_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BENCH_PROVIDER: ${{ matrix.provider }}
          BENCH_SUITE: ${{ matrix.suite }}
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          # Boot daytona sandboxes in the active region (us-west-2). Defaulted so an unsynced secret
          # can't fail the config gatekeeper at module load.
          DAYTONA_TARGET: ${{ secrets.DAYTONA_TARGET || 'us-west-2' }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          BL_API_KEY: ${{ secrets.BL_API_KEY }}
          BL_WORKSPACE: ${{ secrets.BL_WORKSPACE }}
          NOVITA_API_KEY: ${{ secrets.NOVITA_API_KEY }}
        run: bun apps/cli/src/bin/bench-suite.ts "$BENCH_PROVIDER" "$BENCH_SUITE" "$GITHUB_RUN_ID"

      - name: Upload Run + raw results
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          # Per-cell artifact name so every (provider, suite) shard uploads independently.
          name: bench-${{ matrix.suite }}-${{ matrix.provider }}-${{ github.run_id }}
          path: data/
          # A successful run always writes data/runs/<id>.json (even an all-skipped Run), so an empty
          # data/ means the job is genuinely broken — fail the upload rather than bury a warning.
          if-no-files-found: error

  # Collect every shard Run, aggregate into one candidate, gate it (promote), and commit the published
  # dataset. candidate→promote: aggregate is the collect half, promote the validate-and-publish half.
  publish:
    name: Aggregate + promote dataset
    needs: bench
    # Run even if some matrix cells failed (fail-fast is off) so the successful shards still publish:
    # `aggregate` exits non-zero when zero shards are found and `promote` gates on >=1 validated
    # provider, so the quality bar is preserved. `!cancelled()` still lets an explicit cancel stop it.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    # Commit the published dataset back to the branch.
    permissions:
      contents: write
    steps:
      # Unlike the read-only jobs above, this one commits + `git push`es the published dataset, so it
      # keeps the default persisted job token (contents: write above authorizes it). Don't add
      # persist-credentials: false here or the push at the end of the job loses its credentials.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Pull every per-cell shard artifact into ./shards (each in its own subdir).
      - name: Download shard artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: shards
          pattern: bench-*-${{ github.run_id }}
          merge-multiple: false

      # Aggregate the shards' Run documents into one candidate, then promote (gate on >=1 validated
      # provider) and publish into the committed dataset at data/dataset/. The run-id matches the shards.
      #
      # The glob names the Run document EXACTLY, `<runId>.json`, and must not gain a `data/` segment:
      # the bench cell uploads `path: data/`, and upload-artifact roots the artifact at the least common
      # ancestor of the matched files — so a shard unpacks as `shards/<artifact>/runs/<runId>.json`, with
      # no `data/` prefix. Two decoys sit next to it that a `runs/*.json` wildcard would sweep in: the
      # sibling `runs/index.json` (an index, not a Run), and `dataset/runs/<oldRunId>.json` (the committed
      # dataset, which rides along because it lives under data/). Both would poison the aggregate.
      - name: Aggregate + promote
        run: |
          shopt -s nullglob
          shards=(shards/*/runs/"$GITHUB_RUN_ID".json)
          if [ ${#shards[@]} -eq 0 ]; then echo "no shard Run documents found" >&2; exit 1; fi
          bun apps/cli/src/bin/aggregate.ts "$GITHUB_RUN_ID" data/candidate "${shards[@]}"
          bun apps/cli/src/bin/promote.ts "data/candidate/runs/$GITHUB_RUN_ID.json" data/dataset

      - name: Commit the published dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dataset
          if git diff --cached --quiet; then
            echo "dataset unchanged; nothing to commit"
          else
            git commit -m "chore(dataset): publish run ${GITHUB_RUN_ID}"
            git push
          fi
