name: Bench matrix

# Fan the live benchmark out across the full provider × suite matrix: one job per (provider, suite)
# cell, each spinning up a real sandbox, running its suite, and uploading the normalized Run as an
# artifact. The matrix is computed from the SUITES × PROVIDERS registries by `plan-matrix` — adding a
# provider or suite to its registry grows CI with no workflow edit. Off the PR path (real sandbox time
# + provider credentials); dispatch on demand from main only, gated by Environment `privileged`
# (required reviewers + environment secrets — see docs/ci-secrets.md).
on:
  workflow_dispatch:
    inputs:
      providers:
        description: 'Comma-separated providers to benchmark (blank = every registered provider).'
        required: false
        type: string
        # The providers with a baked toolchain artifact and credentials in CI. blaxel boots the stock
        # base image (nothing baked for it), so it is excluded by default rather than burning ~150min
        # of runner time per suite on cells that cannot produce a comparable result. Pass it explicitly
        # to include it; `plan-matrix` rejects any name that is not in the registry.
        default: e2b,daytona,modal

# Least privilege: jobs only read the checked-out code and upload artifacts (publish elevates).
permissions:
  contents: read

# Serialize matrix runs on a ref so concurrent dispatches don't contend for provider quota.
concurrency:
  group: bench-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Compute the provider × suite matrix once, as the single $GITHUB_OUTPUT contract the fan-out reads.
  # No secrets — plan stays off the privileged environment so approval isn't needed just to dry-run
  # the matrix shape; the gate below still confines dispatch to this repo's main.
  plan:
    name: Plan matrix
    if: >
      github.ref == 'refs/heads/main' &&
      github.repository == 'starslingdev/sandbox-benchmarks'
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Planning only reads code; don't persist the job token in .git/config.
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # plan-matrix prints one line of compact JSON ({"include":[...]}) — the strategy.matrix contract.
      - name: Plan
        id: plan
        # The dispatch input reaches plan-matrix through the environment, never interpolated into the
        # shell, so a crafted input can't inject into the runner command.
        env:
          BENCH_PROVIDERS: ${{ inputs.providers }}
        # Capture into a variable first so a plan-matrix.ts failure aborts the step (set -e): inlining
        # the command substitution inside `echo` would mask its exit code behind echo's 0. An
        # unregistered provider name exits 2 here, so a typo fails the plan instead of quietly
        # publishing a dataset with that provider missing.
        run: |
          matrix="$(bun apps/cli/src/bin/plan-matrix.ts)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  bench:
    name: ${{ matrix.suite }} on ${{ matrix.provider }}
    needs: plan
    if: >
      github.ref == 'refs/heads/main' &&
      github.repository == 'starslingdev/sandbox-benchmarks'
    # The ephemeral self-hosted label is reaped after 70 minutes even while a step is healthy. The
    # full CPU-generic and real-world matrices legitimately exceed that on slower providers, leaving
    # the step stuck `in_progress` with no logs/artifact. Hosted runners honor timeout-minutes below;
    # 180 minutes also leaves teardown/artifact margin around the longest 155-minute suite budget.
    runs-on: ubuntu-24.04
    environment: privileged
    timeout-minutes: 180
    strategy:
      # One cell's failure (a flaky provider) must not cancel the rest of the matrix.
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This cell only reads code (the sandbox clones via BENCH_REPO_TOKEN when set, not the
          # checkout's credentials), so don't persist the job token in .git/config.
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Drive the provider SDK to create a sandbox, run the suite, collect results, and normalize. The
      # cell's provider/suite are matrix values, passed through the environment (never interpolated into
      # the shell) so a registry value can't inject into the runner command.
      - name: Run suite and normalize
        env:
          BENCH_REPO_REF: ${{ github.sha }}
          # Optional once the repo is public (anonymous clone works). Still passed so private forks and
          # rate-limited clones keep working via the short-lived job token.
          BENCH_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BENCH_PROVIDER: ${{ matrix.provider }}
          BENCH_SUITE: ${{ matrix.suite }}
          # Scope every provider credential to the cell that actually uses it: a cell receives ONLY
          # the secret(s) for its own `matrix.provider`, so a compromised adapter or suite can't read
          # another provider's credential out of the environment. A non-matching provider evaluates to
          # '', which the config gatekeeper treats as unset (packages/providers/src/lib/config.ts:
          # empty ⇒ unset), exactly like an unsynced secret — so blanking the others is inert.
          DAYTONA_API_KEY: ${{ matrix.provider == 'daytona' && secrets.DAYTONA_API_KEY || '' }}
          # Boot daytona sandboxes in the active region (us-west-2); the default applies only to the
          # daytona cell so an unsynced secret can't fail the config gatekeeper at module load.
          DAYTONA_TARGET: ${{ matrix.provider == 'daytona' && (secrets.DAYTONA_TARGET || 'us-west-2') || '' }}
          E2B_API_KEY: ${{ matrix.provider == 'e2b' && secrets.E2B_API_KEY || '' }}
          MODAL_TOKEN_ID: ${{ matrix.provider == 'modal' && secrets.MODAL_TOKEN_ID || '' }}
          MODAL_TOKEN_SECRET: ${{ matrix.provider == 'modal' && secrets.MODAL_TOKEN_SECRET || '' }}
          BL_API_KEY: ${{ matrix.provider == 'blaxel' && secrets.BL_API_KEY || '' }}
          BL_WORKSPACE: ${{ matrix.provider == 'blaxel' && secrets.BL_WORKSPACE || '' }}
          NOVITA_API_KEY: ${{ matrix.provider == 'novita' && secrets.NOVITA_API_KEY || '' }}
        run: bun apps/cli/src/bin/bench-suite.ts "$BENCH_PROVIDER" "$BENCH_SUITE" "$GITHUB_RUN_ID"

      - name: Upload Run + raw results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-cell artifact name so every (provider, suite) shard uploads independently.
          name: bench-${{ matrix.suite }}-${{ matrix.provider }}-${{ github.run_id }}
          path: data/
          # A successful run always writes data/runs/<id>.json (even an all-skipped Run), so an empty
          # data/ means the job is genuinely broken — fail the upload rather than bury a warning.
          if-no-files-found: error

  # Collect every shard Run, aggregate into one candidate, gate it (promote), regenerate the public
  # leaderboard, and commit both. candidate→promote: aggregate is the collect half, promote the
  # validate-and-publish half. Environment `privileged` is required even without provider secrets —
  # this job is the dataset release surface (`contents: write`).
  publish:
    name: Aggregate + promote dataset
    needs: [plan, bench]
    # Run even if some matrix cells failed (fail-fast is off) so the successful shards still publish:
    # `aggregate` exits non-zero when zero shards are found and `promote` gates on >=1 validated
    # provider, so the quality bar is preserved. `!cancelled()` still lets an explicit cancel stop it.
    # `!cancelled()` opts out of the implicit success() gate, so require `plan` explicitly: a skipped
    # or failed plan means there is no matrix contract, so there is nothing to publish.
    if: >
      !cancelled() &&
      needs.plan.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'starslingdev/sandbox-benchmarks'
    runs-on: ubuntu-24.04
    environment: privileged
    # Commit the published dataset + leaderboard, then open the PR that lands them on main.
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Unlike the read-only jobs above, this one commits + `git push`es the published dataset, so it
      # keeps the default persisted job token (contents: write above authorizes it). Don't add
      # persist-credentials: false here or the push at the end of the job loses its credentials.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Pull every per-cell shard artifact into ./shards (each in its own subdir).
      - name: Download shard artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: shards
          pattern: bench-*-${{ github.run_id }}
          merge-multiple: false

      # Aggregate the shards' Run documents into one candidate, then promote (gate on >=1 validated
      # provider) and publish into the committed dataset at data/dataset/. The run-id matches the shards.
      #
      # The glob names the Run document EXACTLY, `<runId>.json`, and must not gain a `data/` segment:
      # the bench cell uploads `path: data/`, and upload-artifact roots the artifact at the least common
      # ancestor of the matched files — so a shard unpacks as `shards/<artifact>/runs/<runId>.json`, with
      # no `data/` prefix. Two decoys sit next to it that a `runs/*.json` wildcard would sweep in: the
      # sibling `runs/index.json` (an index, not a Run), and `dataset/runs/<oldRunId>.json` (the committed
      # dataset, which rides along because it lives under data/). Both would poison the aggregate.
      - name: Aggregate + promote
        run: |
          shopt -s nullglob
          shards=(shards/*/runs/"$GITHUB_RUN_ID".json)
          if [ ${#shards[@]} -eq 0 ]; then echo "no shard Run documents found" >&2; exit 1; fi
          bun apps/cli/src/bin/aggregate.ts "$GITHUB_RUN_ID" data/candidate "${shards[@]}"
          bun apps/cli/src/bin/promote.ts "data/candidate/runs/$GITHUB_RUN_ID.json" data/dataset

      # Keep LEADERBOARD.md byte-identical to what the renderer produces from the newly promoted Run.
      - name: Regenerate leaderboard
        run: bun apps/cli/src/bin/leaderboard.ts "data/dataset/runs/$GITHUB_RUN_ID.json" LEADERBOARD.md

      # main is protected by a "changes must be made through a pull request" ruleset (the public-repo
      # hardening in #176/#177), so this job can no longer push the promoted dataset straight to main —
      # a direct push is rejected with GH013. Publish through a short-lived branch + pull request
      # instead, then best-effort auto-land it. Opening the PR is the publish now: if the repo can land
      # it without a human (admin bypass, else queued auto-merge) it does; otherwise the PR stays open
      # for a maintainer to merge, which is exactly what the ruleset exists to require.
      - name: Publish the dataset via pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dataset LEADERBOARD.md
          if git diff --cached --quiet; then
            echo "dataset unchanged; nothing to commit"
            exit 0
          fi
          branch="dataset/publish-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          git commit -m "chore(dataset): publish run ${GITHUB_RUN_ID}"
          git push -u origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(dataset): publish run ${GITHUB_RUN_ID}" \
            --body "Automated dataset + leaderboard publish for run [\`${GITHUB_RUN_ID}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})."
          # Land it without a human round-trip when the repo permits: admin bypass if this token may
          # bypass the ruleset, else queued auto-merge for when required checks pass. Both are
          # best-effort — the PR is already open, so a failure here is not a publish failure.
          gh pr merge "$branch" --squash --delete-branch --admin \
            || gh pr merge "$branch" --squash --delete-branch --auto \
            || echo "dataset PR left open for a maintainer to merge"
