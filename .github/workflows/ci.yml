name: CI

# Runs the README's "command contract" on every PR (and every push to main): the same Biome
# lint, typecheck, tests, and spell check a developer runs locally must pass before code can merge.
on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref — a new push cancels the previous, still-running CI for that branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the checked-out code.
permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, test & spell
    runs-on: starsling-ubuntu-24.04-2
    # The runner is self-hosted, so never execute untrusted fork-PR code on it: run only for
    # pushes and pull requests whose head is this same repository (fork PRs are skipped).
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # Third-party actions are pinned to a commit SHA (the tag comment is for humans only) so a
      # moved/compromised tag can't silently change what runs in CI.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned to the toolchain version the repo develops against.
          bun-version: 1.3.14

      # Installs the version-pinned tools from mise.toml (typos) with checksum verification, and
      # caches them. mise itself is version-pinned for reproducibility.
      - name: Set up mise tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.16
          install: true
          cache: true

      # Frozen lockfile: fail if package.json and bun.lock have drifted. --ignore-scripts so CI
      # runs zero lifecycle scripts, matching bunfig.toml's supply-chain posture (minimumReleaseAge,
      # no third-party postinstalls).
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Biome gate — `biome check . --error-on-warnings`; warnings fail the build.
      - name: Lint (Biome)
        run: bun run lint

      # Shell + Dockerfile gates for the toolchain images (packages/templates/images). shellcheck and
      # hadolint are version-pinned in mise.toml and installed by the mise step above.
      - name: Lint shell (shellcheck)
        run: bun run lint:shell

      - name: Lint Dockerfiles (hadolint)
        run: bun run lint:docker

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Catalog drift gate — re-run the PTS catalog generator against the vendored profiles and fail
      # if the committed pts-generated.ts drifts (un-regenerated profile bump or a hand edit). Diffs
      # pts-generated.ts only; pts-overrides.ts curation is excluded.
      - name: Catalog drift
        run: bun run check:catalog-drift

      # Spelling gate — typos (pinned in mise.toml); misspellings fail the build.
      - name: Spell (typos)
        run: bun run spell
