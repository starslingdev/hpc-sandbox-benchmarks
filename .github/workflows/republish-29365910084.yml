name: Republish run 29365910084

# One-off recovery job. The original bench-matrix run 29365910084 aggregated + promoted the dataset
# successfully but its final `git push` lost a non-fast-forward race, so the published dataset never
# landed. This workflow re-runs the exact aggregate + promote against that run's shard artifacts and
# commits the result onto this branch. It removes itself in the same commit, so the branch is left
# with a dataset-only diff. Delete this file once the run is published (it does so itself on success).
on:
  push:
    branches:
      - claude/publish-benchmark-29365910084-iiphkz
    paths:
      - .github/workflows/republish-29365910084.yml

# The published dataset commit is pushed back to this branch; downloading another run's artifacts
# needs actions:read.
permissions:
  contents: write
  actions: read

concurrency:
  group: republish-29365910084
  cancel-in-progress: false

env:
  TARGET_RUN_ID: "29365910084"

jobs:
  republish:
    name: Aggregate + promote dataset (recovery)
    runs-on: ubuntu-24.04
    steps:
      # Keep the default persisted job token (contents: write above authorizes it): this job commits +
      # `git push`es the published dataset back to the branch, so persist-credentials must stay on.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Pull every per-cell shard artifact from the ORIGINAL run (run-id + github-token cross-reference
      # a different run) into ./shards, each in its own subdir.
      - name: Download shard artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: shards
          pattern: bench-*-${{ env.TARGET_RUN_ID }}
          merge-multiple: false
          run-id: ${{ env.TARGET_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Aggregate the shards' Run documents into one candidate, then promote (gate on >=1 validated
      # provider) and publish into the committed dataset at data/dataset/. Identical to the bench-matrix
      # publish job, but pinned to TARGET_RUN_ID (this workflow's own run id differs from the shards').
      #
      # The glob names the Run document EXACTLY, `<runId>.json`, with no `data/` segment: the bench cell
      # uploads `path: data/`, so a shard unpacks as `shards/<artifact>/runs/<runId>.json`. A `runs/*.json`
      # wildcard would sweep in the sibling `runs/index.json` and the committed `dataset/runs/*.json`; both
      # would poison the aggregate.
      - name: Aggregate + promote
        run: |
          shopt -s nullglob
          shards=(shards/*/runs/"$TARGET_RUN_ID".json)
          if [ ${#shards[@]} -eq 0 ]; then echo "no shard Run documents found" >&2; exit 1; fi
          bun apps/cli/src/bin/aggregate.ts "$TARGET_RUN_ID" data/candidate "${shards[@]}"
          bun apps/cli/src/bin/promote.ts "data/candidate/runs/$TARGET_RUN_ID.json" data/dataset

      # Commit the published dataset and remove this recovery workflow in the same commit, so the branch
      # is left with a clean dataset-only diff.
      - name: Commit the published dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --quiet .github/workflows/republish-29365910084.yml
          git add data/dataset
          if git diff --cached --quiet; then
            echo "dataset unchanged; nothing to commit"
          else
            git commit -m "chore(dataset): publish run ${TARGET_RUN_ID}"
            git push
          fi
