# ci-lint.yml runs zizmor with `--min-severity medium --min-confidence high`; only findings zizmor is
# confident about block CI. The ignores below accept specific findings — never blanket-disable an audit
# repo-wide, and always record why the finding is accepted.
rules:
  artipacked:
    ignore:
      # commit-dataset.yml's `commit` job and update-leaderboard.yml's `leaderboard` job are the two
      # checkouts that must keep their persisted job token: each commits its output (the promoted dataset
      # / the regenerated leaderboard) and `git push`es it back to the branch (both grant `contents: write`
      # for exactly this). Every other checkout in the repo sets persist-credentials: false; these can't,
      # by design. (Filename-scoped, not repo-wide — each of these workflows' only checkout is its pushing
      # one, so just their findings are accepted.)
      - commit-dataset.yml
      - update-leaderboard.yml
  secrets-inherit:
    ignore:
      # bench-matrix.yml's suite-matrix job calls the reusable bench-suite.yml with `secrets: inherit`.
      # The reusable's fan-out job declares `environment: privileged`, which raises the approval gate and
      # scopes the provider ENVIRONMENT secrets (docs/ci-secrets.md) to that job, where it re-scopes each
      # credential to its own provider cell (`matrix.provider == 'daytona' && secrets.DAYTONA_API_KEY ||
      # ''`). `inherit` hands the reusable the caller's secret / token context in one line instead of
      # enumerating each secret as a `workflow_call` input (a `uses:` caller can't declare the
      # environment to resolve them itself). The workflow-hardening drift gate independently verifies the
      # callee self-gates on `privileged`. (Filename-scoped, not repo-wide.)
      - bench-matrix.yml
