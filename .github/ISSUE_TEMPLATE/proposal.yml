name: Provider / suite / metric proposal
description: Propose adding a sandbox provider, a benchmark suite, or a metric to the matrix.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        See the "Add a provider / suite / metric" sections of `CONTRIBUTING.md` and
        `docs/methodology.md` before proposing — they describe the registries and invariants a new
        entry must satisfy.
  - type: dropdown
    id: kind
    attributes:
      label: What are you proposing?
      options:
        - New provider
        - New suite
        - New metric
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: "e.g. provider `fly`, suite `startup`, metric `p99-cold-boot-ms`"
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: What does it measure, and why does it belong on the same pinned target?
      description: >
        For a provider: SDK, isolation technology, and pricing basis. For a suite/metric: the
        dimension it measures and the single headline it would contribute.
    validations:
      required: true
  - type: textarea
    id: comparability
    attributes:
      label: Comparability
      description: >
        How does this stay apples-to-apples across every provider on the 2 vCPU · 8 GiB · 40 GB target?
        Note anything a provider can't run (so it would skip rather than mislead).
    validations:
      required: false
