name: Bug report
description: Something in the harness, CLI, normalizer, or leaderboard is wrong or broken.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do **not** paste API keys or `.env` contents anywhere in this
        issue (see SECURITY.md). For a suspected vulnerability, use the private security policy instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you expected versus what you observed.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran, e.g. `bun apps/cli/src/bin/bench-smoke.ts e2b memory`.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider (if relevant)
      options:
        - "N/A"
        - e2b
        - daytona
        - modal
        - blaxel
        - novita
    validations:
      required: false
  - type: input
    id: suite
    attributes:
      label: Suite (if relevant)
      placeholder: "e.g. memory, disk, cpu-generic, network"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, `bun --version`, and anything else that might matter.
    validations:
      required: false
