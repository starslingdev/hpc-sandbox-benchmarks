# typos (https://github.com/crate-ci/typos) config. The checker is pinned in mise.toml and run
# via `bun run spell` / `bun run spell:fix`, locally (pre-commit) and in CI. When typos flags an
# intentional identifier, add it under [default.extend-words] rather than rewording the code.

[files]
# The lockfile is generated and full of hashes/identifiers — don't spell-check it. The pts-profiles
# are vendored verbatim from upstream PTS (fetch-profiles dev script) — we must not reword them, so
# any typo in the upstream prose is theirs to keep, not ours to "fix". The dataset is committed run
# output: provider spec probes, request IDs, and verbatim upstream error pages (e.g. a CloudFront
# diagnostic whose token reads as `Ba`) are recorded as-emitted — not ours to reword — so exclude the
# whole tree and anything published under it.
extend-exclude = ["bun.lock", "packages/schema/src/pts-profiles/**", "data/dataset/**"]

[default.extend-words]
# Domain term: a parsed result not (yet) in the Metric Catalog. International spelling, used as the
# `uncatalogued` field name and `UncataloguedResult` type throughout the dataset model.
uncatalogued = "uncatalogued"
