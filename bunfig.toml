[install]
# Hoisted node_modules: workspace members are symlinked under node_modules/@scope/name, which is
# how `tsc` resolves `extends: "@repo/tsconfig/..."` and bare workspace imports from disk.
linker = "hoisted"

# Supply-chain posture (PRD): no third-party lifecycle scripts run.
# Bun runs preinstall/install/postinstall/prepare scripts for a *dependency* only when it is listed
# in `trustedDependencies` — we declare none, so nothing third-party executes at install time.
# (The root package's OWN scripts still run; that's how `prepare: lefthook install` wires git hooks.)
# Add a package to trustedDependencies as a documented exception only when genuinely required.

# Refuse to install any npm release younger than 7 days, blunting compromised-release attacks.
minimumReleaseAge = 604800
# First-party / trusted toolchain packages we want at their latest regardless of age.
# @computesdk/cloud-run is a TEMPORARY exclusion (added 2026-07-10): 0.1.5 shipped upstream on
# 2026-07-09 and the catalog pins that exact version, so the entry only exists to let the pin
# through the gate. Remove it once 0.1.5 is older than 7 days — leaving it would permanently exempt
# every future release of exactly the kind of young, fast-moving package the gate is for.
minimumReleaseAgeExcludes = ["typescript", "@types/bun", "arktype", "computesdk", "@computesdk/cloud-run", "dotenv", "@biomejs/biome"]
